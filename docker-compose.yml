services:
  postgres:
    image: postgres:16-alpine
    container_name: tasks-postgres
    environment:
      POSTGRES_USER: tasks
      POSTGRES_PASSWORD: tasks
      POSTGRES_DB: Tasks
    ports:
      - "5432:5432"
    volumes:
      - tasks_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks -d Tasks"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: tasks-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://tasks:tasks@postgres:5432/Tasks
      APP_NAME: Tasks API
      API_PREFIX: /api/v1
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  tasks_postgres_data:
